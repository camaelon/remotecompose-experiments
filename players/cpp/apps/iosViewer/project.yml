name: iosViewer
options:
  minimumXcodeGenVersion: "2.38.0"
  deploymentTarget:
    iOS: "17.0"
  bundleIdPrefix: com.rcx
  developmentLanguage: en
  createIntermediateGroups: true

packages:
  ZIPFoundation:
    url: https://github.com/weichsel/ZIPFoundation.git
    from: 0.9.19

settings:
  base:
    MARKETING_VERSION: "0.1"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    CLANG_ENABLE_OBJC_ARC: YES
    CLANG_CXX_LANGUAGE_STANDARD: "c++17"
    CLANG_CXX_LIBRARY: "libc++"

targets:
  iosViewer:
    type: application
    platform: iOS
    sources:
      - path: iosViewer
        excludes:
          - "Bridge/iosViewer-Bridging-Header.h"  # referenced via SWIFT_OBJC_BRIDGING_HEADER
    info:
      path: iosViewer/Info.plist
      properties:
        CFBundleDisplayName: RC Viewer
        UILaunchScreen:
          UIColorName: ""
        UIFileSharingEnabled: YES
        LSSupportsOpeningDocumentsInPlace: YES
        UISupportedInterfaceOrientations~iphone:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        CFBundleDocumentTypes:
          - CFBundleTypeName: "rcX Deck"
            CFBundleTypeRole: Viewer
            LSHandlerRank: Owner
            LSItemContentTypes:
              - com.pkware.zip-archive
              - public.zip-archive
          - CFBundleTypeName: "rcX File"
            CFBundleTypeRole: Viewer
            LSHandlerRank: Owner
            LSItemContentTypes:
              - public.data
            CFBundleTypeExtensions:
              - rc
              - rcd
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rcx.iosviewer
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_OBJC_BRIDGING_HEADER: iosViewer/Bridge/iosViewer-Bridging-Header.h
        # ../../ios is the rcX iOS-lib build (see ios/CMakeLists.txt).
        # Headers + libs live there after `(cd ios && ./build.sh)`.
        HEADER_SEARCH_PATHS:
          - "$(SRCROOT)/../../ios/output/include"
          - "$(SRCROOT)/../../ios/build/_deps/skia-src"
        LIBRARY_SEARCH_PATHS:
          - "$(SRCROOT)/../../ios/output/lib"
        OTHER_LDFLAGS:
          - "-lc++"
          - "-lrccore"
          - "-lrcskia"
          - "-lskia"
        # The iOS lib builds arm64 device slices only. Build for a real
        # device (or an arm64 Simulator slice) to link.
        EXCLUDED_ARCHS[sdk=iphonesimulator*]: "x86_64"
    dependencies:
      - package: ZIPFoundation
      - sdk: UIKit.framework
      - sdk: CoreFoundation.framework
      - sdk: CoreGraphics.framework
      - sdk: CoreText.framework
      - sdk: ImageIO.framework
      - sdk: Metal.framework
      - sdk: MetalKit.framework
      - sdk: AVFoundation.framework
      - sdk: AVKit.framework
